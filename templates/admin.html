<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Alquiler & Montaña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>

    <header>
        <nav class="navbar navbar-dark bg-danger shadow-sm">
            <section class="container">
                <a class="navbar-brand fw-bold" href="/admin">⚙️ Panel de Control de Inventario</a>
                <a class="btn btn-outline-light btn-sm fw-bold" href="/">Ver Vitrina Pública</a>
            </section>
        </nav>
    </header>

    <main class="container mt-5" style="max-width: 700px;">

        <section class="mb-4 text-center">
            <h1 class="h2 fw-bold text-dark">Ingresar Nuevo Activo al Catálogo</h1>
            <p class="text-muted">Rellena los campos de abajo de forma precisa. Los cambios se reflejarán de inmediato.</p>
        </section>

        <form method="POST" action="/admin" class="card p-4 shadow border-0 bg-white">

            <section class="mb-3">
                <label for="titulo" class="form-label fw-bold text-secondary">Título del Anuncio / Producto</label>
                <input type="text" id="titulo" name="titulo" class="form-control" placeholder="Ej: Lote con explanación lista / Toyota Hilux 2024" required>
            </section>

            <section class="mb-3">
                <label for="categoria" class="form-label fw-bold text-secondary">Categoría de Negocio</label>
                <select id="categoria" name="categoria" class="form-select" required>
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="Lote">Lote de Montaña</option>
                    <option value="Casa">Casa o Finca</option>
                    <option value="Carro">Vehículo 4x4</option>
                </select>
            </section>

            <section class="mb-3">
                <label for="ubicacion" class="form-label fw-bold text-secondary">Ubicación Exacta</label>
                <select id="ubicacion" name="ubicacion" class="form-select" required>
                    <option value="" disabled selected>Selecciona la zona...</option>
                    <option value="Santa Elena, Medellín">Santa Elena, Medellín</option>
                    <option value="Guarne, Antioquia">Guarne, Antioquia</option>
                    <option value="El Poblado, Medellín">El Poblado, Medellín</option>
                </select>
            </section>

            <section class="mb-3">
                <label for="precio" class="form-label fw-bold text-secondary">Precio (Solo Números)</label>
                <input type="number" id="precio" name="precio" class="form-control" placeholder="Ej: 150000000" required>
            </section>

            <section class="mb-3">
                <label for="marca" class="form-label fw-bold text-secondary">Marca (Solo si es Vehículo)</label>
                <select id="marca" name="marca" class="form-select">
                    <option value="">No aplica (Es Lote o Casa)</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Nissan">Nissan</option>
                    <option value="Ford">Ford</option>
                </select>
            </section>

            <section class="mb-3">
                <label for="imagen_url" class="form-label fw-bold text-secondary">Nombre del archivo de imagen (Opcional)</label>
                <input type="text" id="imagen_url" name="imagen_url" class="form-control" placeholder="Ej: lote2.jpg / carro3.jpg (Debe estar en static/img/)">
            </section>

            <section class="mb-4">
                <label for="descripcion" class="form-label fw-bold text-secondary">Descripción Detallada</label>
                <textarea id="descripcion" name="descripcion" class="form-control" rows="4" placeholder="Escribe las características más atractivas para tus campañas de Google Ads..." required></textarea>
            </section>

            <button type="submit" class="btn btn-danger w-100 fw-bold py-2 shadow-sm">🚀 Registrar en la Base de Datos</button>

        </form>

    </main>

    <footer class="bg-light py-3 mt-5 border-top">
        <section class="container text-center text-muted">
            <p class="small mb-0">&copy; 2026 Admin | Alquiler & Montaña - Panel Semántico Conectado de Alta Eficiencia.</p>
        </section>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
